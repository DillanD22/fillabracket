<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title> March Madness Mock Bracket </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="main-title">March Madness Mock Bracket</h1>
    <div id="controls">
        <button id="edit-toggle" onclick="toggleEditMode()">Edit Teams</button>
        <button id="reset-btn" onclick="resetBracket()">Reset Bracket</button>
    </div>
    <div id="bracket-container">
        <div id="left-side"></div>
        <div id="center"></div>
        <div id="right-side"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
